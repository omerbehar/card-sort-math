items:
  - name: WalletData
    type: class
    source: design/gdd/deck-economy.md
    attributes:
      coins: "int, 0–COINS_MAX (999999)"
      gems: "int, 0–GEMS_MAX (9999)"
    description: Pure core/ RefCounted holding currency balances; persisted in SaveData
    referenced_by: []

  - name: EarnSource
    type: enum
    source: design/gdd/deck-economy.md
    values: [LEVEL_WIN, DAILY_CHALLENGE, REWARDED_AD, IAP, MILESTONE_GIFT, GEM_CONVERT]
    description: "Earn-credit provenance. GEM_CONVERT added for gem→coin conversion (AC-GC01). SOURCE_ROLLBACK removed — post-review, a failed transaction restores via pre-spend snapshot assignment (EC-09), not earn(). DAILY_REWARD removed — superseded by DAILY_CHALLENGE."
    referenced_by: []

  - name: EconomyEvent
    type: enum
    source: design/gdd/deck-economy.md
    values: [CURRENCY_EARNED, CURRENCY_SPENT, SPEND_FAILED, EARN_CAP_REACHED, TRANSACTION_ROLLED_BACK, BOOSTER_ACTIVATED, BOOSTER_PRECONDITION_FAILED, BOOSTER_PURCHASE_FAILED, HINT_RESULT, IAP_BLOCKED]
    description: "Economy event kind — a SEPARATE core/ type from board GameEvent (different payload/owner). Emitted by WalletService as typed signals; HUD + Analytics subscribe."
    referenced_by: []

