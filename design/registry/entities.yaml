# Entity Registry — CardSortMath
# Cross-system facts that must remain consistent across GDDs.
# Never modify existing value fields without surfacing a conflict first.
# Add `referenced_by` entries when a new GDD references an existing entity.

# ─── Deck Economy ────────────────────────────────────────────────────────────
# Source: design/gdd/deck-economy.md

formulas:
  - name: hint_score
    source: design/gdd/deck-economy.md
    description: Scores exposed cards to identify the most productive tap for the Hint booster
    variables: [routes_directly, opens_new_cards, discard_relief, ROUTES_WEIGHT, OPENS_WEIGHT, RELIEF_WEIGHT]
    output_range: "0–405 (ordinal only; practical upper bound at default weights on 18-card board)"
    referenced_by: []

  - name: reshuffle_seed
    source: design/gdd/deck-economy.md
    description: Deterministic seed for a board reshuffle, keyed on level+session+count. Derived by an EXPLICIT integer mix (ADR-0009), NOT GDScript hash() — hash() is banned for rng.seed by ADR-0007 (platform/version-unstable). level_start_timestamp comes from the injectable TimeProvider seam (ADR-0009).
    variables: [level_id, level_start_timestamp, reshuffle_count]
    output_range: "non-negative 63-bit int [0, 2^63-1]"
    referenced_by: []

  - name: daily_income_model
    source: design/gdd/deck-economy.md
    description: Design calibration formula for expected daily coin income (non-runtime)
    variables: [sessions_per_day, levels_per_session, avg_coins_per_level, daily_challenge_coins, streak_bonus, ads_per_day, coins_per_ad]
    output_range: "~600–900 coins/day (engaged non-payer)"
    referenced_by: []

