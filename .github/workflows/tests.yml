name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# The gdUnit4 action publishes results as a check run and PR comment.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: gdUnit4 (Godot ${{ matrix.godot-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        godot-version: ["4.6"]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gdUnit4 tests
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          # Use the vendored addons/gdUnit4 (v6.1.3) instead of downloading
          # the latest upstream release, which would replace it.
          version: "installed"
          godot-version: ${{ matrix.godot-version }}
          paths: "res://tests"
          # The action uploads the report as an artifact by default.
          report-name: test-report.xml
