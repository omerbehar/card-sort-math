<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- clockwise loop (re-deal) with a gap at the top -->
  <path d="M12 4 A 8 8 0 1 1 6 6"/>
  <!-- arrowhead at the top, pointing in the direction of travel -->
  <polygon points="11.5,0.5 16,4 11.5,7.5" fill="#ffffff" stroke="none"/>
  <!-- cards being repositioned (no values) -->
  <circle cx="9.5" cy="11" r="1.1" fill="#ffffff" stroke="none"/>
  <circle cx="14" cy="10.5" r="1.1" fill="#ffffff" stroke="none"/>
  <circle cx="11.5" cy="14.5" r="1.1" fill="#ffffff" stroke="none"/>
</svg>
